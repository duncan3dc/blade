name: buildcheck

on:
  push:
  schedule:
    - cron: 0 10 9 * *

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.3"
          - "8.4"
          - "8.5"
        composer:
          - ""
          - "--prefer-lowest"
        laravel:
          - ""
          - "8.0"
          - "9.0"
          - "10.0"
          - "11.0"
          - "12.0"
          - "13.2"
        include:
          - php: "7.3"
            laravel: ""
            composer: ""
          - php: "7.3"
            laravel: ""
            composer: "--prefer-lowest"
          - php: "7.4"
            laravel: ""
            composer: ""
          - php: "7.4"
            laravel: ""
            composer: "--prefer-lowest"
          - php: "8.0"
            laravel: ""
            composer: ""
          - php: "8.0"
            laravel: ""
            composer: "--prefer-lowest"
          - php: "8.0"
            laravel: "8.0"
            composer: ""
          - php: "8.0"
            laravel: "8.0"
            composer: "--prefer-lowest"
          - php: "8.0"
            laravel: "9.0"
            composer: ""
          - php: "8.0"
            laravel: "9.0"
            composer: "--prefer-lowest"
          - php: "8.1"
            laravel: ""
            composer: ""
          - php: "8.1"
            laravel: ""
            composer: "--prefer-lowest"
          - php: "8.1"
            laravel: "8.0"
            composer: ""
          - php: "8.1"
            laravel: "8.0"
            composer: "--prefer-lowest"
          - php: "8.1"
            laravel: "9.0"
            composer: ""
          - php: "8.1"
            laravel: "9.0"
            composer: "--prefer-lowest"
          - php: "8.1"
            laravel: "10.0"
            composer: ""
          - php: "8.1"
            laravel: "10.0"
            composer: "--prefer-lowest"
          - php: "8.2"
            laravel: ""
            composer: ""
          - php: "8.2"
            laravel: ""
            composer: "--prefer-lowest"
          - php: "8.2"
            laravel: "8.0"
            composer: ""
          - php: "8.2"
            laravel: "8.0"
            composer: "--prefer-lowest"
          - php: "8.2"
            laravel: "9.0"
            composer: ""
          - php: "8.2"
            laravel: "9.0"
            composer: "--prefer-lowest"
          - php: "8.2"
            laravel: "10.0"
            composer: ""
          - php: "8.2"
            laravel: "10.0"
            composer: "--prefer-lowest"
          - php: "8.2"
            laravel: "11.0"
            composer: ""
          - php: "8.2"
            laravel: "11.0"
            composer: "--prefer-lowest"
          - php: "8.2"
            laravel: "12.0"
            composer: ""
          - php: "8.2"
            laravel: "12.0"
            composer: "--prefer-lowest"

    steps:
      - uses: actions/checkout@v1

      - name: Create Docker Container
        run: |
          docker build . -t ci-image --build-arg PHP_VERSION=${{ matrix.php }}
          docker run --interactive --detach --volume ${{ github.workspace }}:/app --name ci ci-image

      - name: Install Dependencies
        run: |
          docker exec ci .github/laravel.php ${{ matrix.laravel }}
          docker exec ci composer update --no-interaction --no-ansi --prefer-dist ${{ matrix.composer }}

      - name: PHPUnit
        run: docker exec ci vendor/bin/phpunit

      - name: PHPStan
        run: |
          docker exec ci vendor/bin/phpstan analyse --level=max --configuration=phpstan-src.neon src
          docker exec ci vendor/bin/phpstan analyse --level=max --configuration=phpstan-tests.neon tests

      - name: Coding Standards
        run: docker exec ci vendor/bin/phpcs

      - name: Check Dependencies
        run: docker exec ci vendor/bin/composer-require-checker

      - name: Composer Validate
        run: docker exec ci composer validate --strict
